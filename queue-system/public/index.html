<!DOCTYPE html>
<html>
<head>
    <title>Smart Queue System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎫 Smart Queue Management</h1>

    <div class="card">
        <form id="queueForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="Phone Number (e.g. +123...)" required>

            <select id="service">
                <option value="Doctor">👨‍⚕️ Doctor Consultation</option>
                <option value="Billing">💳 Billing & Payment</option>
                <option value="Inquiry">ℹ️ General Inquiry</option>
            </select>

            <label class="priority-check" for="priority">
                <input type="checkbox" id="priority">
                <span>⚠️ Emergency / Priority Case</span>
            </label>

            <button type="submit">Get Your Token</button>
        </form>
    </div>

    <div class="token-box">
        <div id="tokenDisplay">Your Token Will Appear Here</div>
    </div>

    <div class="queue-section">
        <h3>📋 Live Status</h3>
        <ul id="queueList"></ul>
    </div>
</div>

<!-- AI Chatbot Widget -->
<div id="chat-widget">
    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <h4>🏥 Health-AI Assistant</h4>
            <button onclick="toggleChat()">×</button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask about hours, specialty...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <button id="chat-toggle" onclick="toggleChat()">💬 Ask Assistant</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
